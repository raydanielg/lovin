; PHP Configuration for Glovin
; Place this file in public_html/ folder

; Memory and Execution
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
max_input_vars = 3000

; Upload Size
upload_max_filesize = 64M
post_max_size = 64M

; Error Reporting (production)
display_errors = Off
log_errors = On
error_log = /home/glovinco/logs/php_error.log

; Timezone
date.timezone = Africa/Dar_es_Salaam

; Extensions (hakikisha zime install)
; extension=pdo_mysql
; extension=mbstring
; extension=openssl
; extension=tokenizer
; extension=xml
; extension=curl
; extension=zip
; extension=bcmath
; extension=ctype
; extension=json
; extension=fileinfo
